<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - ShopEasy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #6366f1;
      --primary-light: #818cf8;
      --secondary: #ec4899;
      --accent: #06b6d4;
      --success: #22c55e;
      --warning: #f59e0b;
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.95);
      --text-primary: #1e293b;
      --text-secondary: #64748b;
      --text-muted: #94a3b8;
      --border: rgba(99, 102, 241, 0.2);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
      --gradient-mesh: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #06b6d4 100%);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -1;
      background: 
        radial-gradient(at 30% 20%, rgba(99, 102, 241, 0.08) 0%, transparent 50%),
        radial-gradient(at 80% 10%, rgba(236, 72, 153, 0.06) 0%, transparent 50%);
    }

    .navbar {
      background: rgba(255, 255, 255, 0.9) !important;
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 1rem 0;
    }

    .navbar-brand {
      font-size: 1.8rem;
      font-weight: 800;
      background: var(--gradient-mesh);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .checkout-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .checkout-title {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .checkout-title i {
      background: var(--gradient-mesh);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .checkout-grid {
      display: grid;
      grid-template-columns: 1fr 400px;
      gap: 2rem;
    }

    @media (max-width: 992px) {
      .checkout-grid {
        grid-template-columns: 1fr;
      }
    }

    .checkout-form-card, .order-summary-card {
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
    }

    .form-section {
      margin-bottom: 2rem;
    }

    .form-section-title {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .form-section-title i {
      color: var(--primary);
    }

    .form-control {
      border: 2px solid rgba(99, 102, 241, 0.1);
      border-radius: 12px;
      padding: 0.875rem 1rem;
      font-size: 1rem;
      transition: all 0.3s ease;
      background: white;
    }

    .form-control:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
    }

    .form-label {
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
    }

    .payment-methods {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }

    .payment-method {
      border: 2px solid rgba(99, 102, 241, 0.1);
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .payment-method:hover, .payment-method.active {
      border-color: var(--primary);
      background: rgba(99, 102, 241, 0.05);
    }

    .payment-method i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--primary);
    }

    .payment-method span {
      font-size: 0.875rem;
      font-weight: 600;
      display: block;
    }

    .order-item {
      display: flex;
      gap: 1rem;
      padding: 1rem 0;
      border-bottom: 1px solid rgba(99, 102, 241, 0.1);
    }

    .order-item:last-child {
      border-bottom: none;
    }

    .order-item img {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
    }

    .order-item-info {
      flex: 1;
    }

    .order-item-name {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .order-item-qty {
      color: var(--text-muted);
      font-size: 0.875rem;
    }

    .order-item-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 1.1rem;
    }

    .summary-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      color: var(--text-secondary);
    }

    .summary-row.total {
      border-top: 2px solid var(--border);
      margin-top: 1rem;
      padding-top: 1rem;
      font-size: 1.3rem;
      font-weight: 800;
      color: var(--text-primary);
    }

    .btn-checkout {
      background: var(--gradient-mesh);
      border: none;
      color: white;
      padding: 1rem 2rem;
      border-radius: 16px;
      font-weight: 700;
      font-size: 1.1rem;
      width: 100%;
      margin-top: 1.5rem;
      transition: all 0.3s ease;
    }

    .btn-checkout:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 35px rgba(99, 102, 241, 0.3);
    }

    .empty-cart {
      text-align: center;
      padding: 3rem 2rem;
    }

    .empty-cart i {
      font-size: 4rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .empty-cart h3 {
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .empty-cart p {
      color: var(--text-secondary);
      margin-bottom: 1.5rem;
    }

    .btn-continue-shopping {
      background: var(--gradient-mesh);
      border: none;
      color: white;
      padding: 0.875rem 2rem;
      border-radius: 12px;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
      transition: all 0.3s ease;
    }

    .btn-continue-shopping:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(99, 102, 241, 0.3);
      color: white;
    }

    .toast-container {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
    }

    .toast {
      background: var(--bg-card);
      backdrop-filter: blur(10px);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1rem 1.5rem;
      box-shadow: var(--shadow-lg);
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from {
        transform: translateX(100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.9);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-spinner {
      width: 60px;
      height: 60px;
      border: 4px solid rgba(99, 102, 241, 0.1);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg">
    <div class="container">
      <a class="navbar-brand" href="/">ShopEasy</a>
      <a href="/shop/" class="btn btn-outline-primary rounded-pill">
        <i class="fas fa-arrow-left me-2"></i>Continue Shopping
      </a>
    </div>
  </nav>

  <div class="checkout-container">
    <h1 class="checkout-title">
      <i class="fas fa-credit-card"></i>
      Checkout
    </h1>

    <div id="emptyCartMessage" class="checkout-form-card empty-cart" style="display: none;">
      <i class="fas fa-shopping-cart"></i>
      <h3>Your cart is empty</h3>
      <p>Add some products to your cart before checking out</p>
      <a href="/shop/" class="btn-continue-shopping">
        <i class="fas fa-shopping-bag me-2"></i>Start Shopping
      </a>
    </div>

    <div id="checkoutContent" class="checkout-grid">
      <!-- Checkout Form -->
      <div class="checkout-form-card">
        <form id="checkoutForm">
          <!-- Shipping Info -->
          <div class="form-section">
            <h3 class="form-section-title">
              <i class="fas fa-map-marker-alt"></i>
              Shipping Information
            </h3>
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control" id="fullName" required placeholder="John Doe">
              </div>
              <div class="col-md-6">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-control" id="phone" required placeholder="+91 98765 43210">
              </div>
              <div class="col-12">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" id="email" required placeholder="john@example.com">
              </div>
              <div class="col-12">
                <label class="form-label">Street Address</label>
                <input type="text" class="form-control" id="address" required placeholder="123 Main Street, Apt 4B">
              </div>
              <div class="col-md-4">
                <label class="form-label">City</label>
                <input type="text" class="form-control" id="city" required placeholder="Mumbai">
              </div>
              <div class="col-md-4">
                <label class="form-label">State</label>
                <input type="text" class="form-control" id="state" required placeholder="Maharashtra">
              </div>
              <div class="col-md-4">
                <label class="form-label">PIN Code</label>
                <input type="text" class="form-control" id="pincode" required placeholder="400001">
              </div>
            </div>
          </div>

          <!-- Payment Method -->
          <div class="form-section">
            <h3 class="form-section-title">
              <i class="fas fa-wallet"></i>
              Payment Method
            </h3>
            <div class="payment-methods">
              <div class="payment-method active" data-method="card">
                <i class="fas fa-credit-card"></i>
                <span>Card</span>
              </div>
              <div class="payment-method" data-method="upi">
                <i class="fas fa-mobile-alt"></i>
                <span>UPI</span>
              </div>
              <div class="payment-method" data-method="cod">
                <i class="fas fa-money-bill-wave"></i>
                <span>Cash on Delivery</span>
              </div>
            </div>
          </div>

          <button type="submit" class="btn-checkout">
            <i class="fas fa-lock me-2"></i>
            Place Order - <span id="checkoutTotal">₹0.00</span>
          </button>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="order-summary-card">
        <h3 class="form-section-title">
          <i class="fas fa-receipt"></i>
          Order Summary
        </h3>
        <div id="orderItems">
          <!-- Items will be rendered here -->
        </div>
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">₹0.00</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span id="shipping">₹0.00</span>
        </div>
        <div class="summary-row">
          <span>Tax (18% GST)</span>
          <span id="tax">₹0.00</span>
        </div>
        <div class="summary-row total">
          <span>Total</span>
          <span id="total">₹0.00</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-spinner"></div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const apiBaseUrl = 'http://127.0.0.1:8000/api';
    let cart = [];
    let selectedPaymentMethod = 'card';

    // Load cart from localStorage
    function loadCart() {
      const savedCart = localStorage.getItem('cart');
      if (savedCart) {
        cart = JSON.parse(savedCart);
      }
      renderOrderSummary();
    }

    // Render order summary
    function renderOrderSummary() {
      const orderItemsContainer = document.getElementById('orderItems');
      const emptyCartMessage = document.getElementById('emptyCartMessage');
      const checkoutContent = document.getElementById('checkoutContent');

      if (cart.length === 0) {
        emptyCartMessage.style.display = 'block';
        checkoutContent.style.display = 'none';
        return;
      }

      emptyCartMessage.style.display = 'none';
      checkoutContent.style.display = 'grid';

      let subtotal = 0;
      orderItemsContainer.innerHTML = cart.map(item => {
        const itemTotal = item.price * item.quantity;
        subtotal += itemTotal;
        return `
          <div class="order-item">
            <img src="${item.imageUrl || 'https://via.placeholder.com/80'}" alt="${item.name}">
            <div class="order-item-info">
              <div class="order-item-name">${item.name}</div>
              <div class="order-item-qty">Qty: ${item.quantity}</div>
            </div>
            <div class="order-item-price">₹${itemTotal.toFixed(2)}</div>
          </div>
        `;
      }).join('');

      const shipping = subtotal > 500 ? 0 : 50;
      const tax = subtotal * 0.18;
      const total = subtotal + shipping + tax;

      document.getElementById('subtotal').textContent = `₹${subtotal.toFixed(2)}`;
      document.getElementById('shipping').textContent = shipping === 0 ? 'FREE' : `₹${shipping.toFixed(2)}`;
      document.getElementById('tax').textContent = `₹${tax.toFixed(2)}`;
      document.getElementById('total').textContent = `₹${total.toFixed(2)}`;
      document.getElementById('checkoutTotal').textContent = `₹${total.toFixed(2)}`;
    }

    // Payment method selection
    document.querySelectorAll('.payment-method').forEach(method => {
      method.addEventListener('click', () => {
        document.querySelectorAll('.payment-method').forEach(m => m.classList.remove('active'));
        method.classList.add('active');
        selectedPaymentMethod = method.dataset.method;
      });
    });

    // Checkout form submission
    document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const loadingOverlay = document.getElementById('loadingOverlay');
      loadingOverlay.classList.add('active');

      const orderData = {
        cart: cart.map(item => ({
          productId: item.id,
          quantity: item.quantity
        })),
        shipping: {
          fullName: document.getElementById('fullName').value,
          phone: document.getElementById('phone').value,
          email: document.getElementById('email').value,
          address: document.getElementById('address').value,
          city: document.getElementById('city').value,
          state: document.getElementById('state').value,
          pincode: document.getElementById('pincode').value
        },
        paymentMethod: selectedPaymentMethod
      };

      try {
        const res = await fetch(`${apiBaseUrl}/checkout/`, {
          method: 'POST',
          headers: { 
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
          },
          body: JSON.stringify(orderData)
        });

        const data = await res.json();

        if (res.ok) {
          // Clear cart
          cart = [];
          localStorage.setItem('cart', JSON.stringify(cart));
          
          showToast('Order placed successfully!', 'Your order has been confirmed.', 'success');
          
          // Redirect to confirmation page after 2 seconds
          setTimeout(() => {
            window.location.href = `/order-confirmation/?order_id=${data.order_id}`;
          }, 2000);
        } else {
          showToast('Checkout failed', data.message || 'Please try again', 'danger');
        }
      } catch (err) {
        showToast('Network error', 'Please check your connection and try again', 'danger');
      } finally {
        loadingOverlay.classList.remove('active');
      }
    });

    // Toast notification
    function showToast(title, message, type = 'info') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      toast.className = 'toast';
      toast.innerHTML = `
        <div class="d-flex align-items-center">
          <i class="fas fa-${type === 'success' ? 'check-circle text-success' : type === 'danger' ? 'exclamation-circle text-danger' : 'info-circle text-info'} me-2"></i>
          <div>
            <strong>${title}</strong>
            <p class="mb-0" style="font-size: 0.875rem; color: var(--text-secondary);">${message}</p>
          </div>
        </div>
      `;
      container.appendChild(toast);
      
      setTimeout(() => {
        toast.style.opacity = '0';
        toast.style.transform = 'translateX(100%)';
        setTimeout(() => toast.remove(), 300);
      }, 4000);
    }

    // Get CSRF token
    function getCookie(name) {
      let cookieValue = null;
      if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
          const cookie = cookies[i].trim();
          if (cookie.substring(0, name.length + 1) === (name + '=')) {
            cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
            break;
          }
        }
      }
      return cookieValue;
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', loadCart);
  </script>
</body>
</html>
