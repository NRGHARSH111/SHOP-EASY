<!-- Auth Modal - Bravo Styled -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content bravo-auth-modal">
      <div class="modal-header border-0 pb-0">
        <div class="bravo-auth-logo mx-auto">
          <i class="fas fa-shopping-bag"></i>
          <span>Shop<span class="gradient-text">Easy</span></span>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Tabs -->
        <div class="bravo-tabs">
          <button class="bravo-tab active" data-tab="login" id="bravoLoginTab">Sign In</button>
          <button class="bravo-tab" data-tab="signup" id="bravoSignupTab">Create Account</button>
        </div>

        <!-- Login Form -->
        <div class="bravo-form active" id="bravoLoginForm">
          <form id="loginForm">
            <div class="bravo-input-group">
              <input type="text" class="bravo-input" name="username" placeholder="Username or Email" required>
              <i class="fas fa-user input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="password" class="bravo-input" name="password" placeholder="Password" required>
              <i class="fas fa-lock input-icon"></i>
              <button type="button" class="toggle-password" tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <label class="bravo-checkbox">
                <input type="checkbox" id="rememberMe">
                <span class="checkmark"></span>
                <span class="label-text">Remember me</span>
              </label>
            </div>
            <button type="submit" class="bravo-submit-btn">
              <span>Sign In</span>
              <div class="btn-spinner"></div>
            </button>
          </form>
        </div>

        <!-- Signup Form -->
        <div class="bravo-form" id="bravoSignupForm">
          <form id="signupForm">
            <div class="bravo-input-group">
              <input type="text" class="bravo-input" name="username" placeholder="Username" required minlength="3">
              <i class="fas fa-user input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="email" class="bravo-input" name="email" placeholder="Email Address" required>
              <i class="fas fa-envelope input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="password" class="bravo-input" name="password" id="signupPassword" placeholder="Password" required minlength="8">
              <i class="fas fa-lock input-icon"></i>
              <button type="button" class="toggle-password" tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength-meter mb-3">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <small class="strength-text" id="strengthText">Enter a strong password</small>
            </div>
            <button type="submit" class="bravo-submit-btn btn-success">
              <span>Create Account</span>
              <div class="btn-spinner"></div>
            </button>
          </form>
        </div>

        <!-- Footer -->
        <div class="bravo-auth-footer text-center mt-3">
          <p class="login-footer">Don't have an account? <a href="#" class="switch-tab" data-target="signup">Sign up</a></p>
          <p class="signup-footer" style="display: none;">Already have an account? <a href="#" class="switch-tab" data-target="login">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  /* Bravo Auth Modal Styles */
  .bravo-auth-modal {
    background: linear-gradient(135deg, #1e1b4b 0%, #312e81 50%, #1e1b4b 100%);
    border: 1px solid rgba(139, 92, 246, 0.3);
    border-radius: 24px;
    box-shadow: 
      0 25px 50px -12px rgba(0, 0, 0, 0.8),
      0 0 60px rgba(139, 92, 246, 0.3);
    overflow: hidden;
  }

  .bravo-auth-modal::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 3px;
    background: linear-gradient(90deg, #8b5cf6, #ec4899, #22d3ee, #8b5cf6);
    background-size: 300% 100%;
    animation: gradientMove 3s ease infinite;
  }

  @keyframes gradientMove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .bravo-auth-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.75rem;
    font-weight: 700;
    color: white;
    margin-left: auto;
    margin-right: auto;
  }

  .bravo-auth-logo i {
    font-size: 1.5rem;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .gradient-text {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Tabs */
  .bravo-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: rgba(15, 23, 42, 0.6);
    padding: 6px;
    border-radius: 16px;
  }

  .bravo-tab {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: #94a3b8;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .bravo-tab.active {
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    color: white;
    box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
  }

  .bravo-tab:hover:not(.active) {
    color: #f8fafc;
    background: rgba(139, 92, 246, 0.1);
  }

  /* Forms */
  .bravo-form {
    display: none;
    animation: fadeInUp 0.4s ease;
  }

  .bravo-form.active {
    display: block;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input Groups */
  .bravo-input-group {
    position: relative;
    margin-bottom: 16px;
  }

  .bravo-input {
    width: 100%;
    padding: 14px 44px 14px 44px;
    background: rgba(15, 23, 42, 0.6);
    border: 2px solid rgba(139, 92, 246, 0.2);
    border-radius: 12px;
    color: #f8fafc;
    font-size: 0.95rem;
    transition: all 0.3s ease;
  }

  .bravo-input::placeholder {
    color: #64748b;
  }

  .bravo-input:focus {
    outline: none;
    border-color: #8b5cf6;
    box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2);
    background: rgba(15, 23, 42, 0.8);
  }

  .bravo-input-group .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #64748b;
    font-size: 1rem;
  }

  .bravo-input:focus + .input-icon {
    color: #8b5cf6;
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(139, 92, 246, 0.1);
    border: 1px solid rgba(139, 92, 246, 0.2);
    color: #94a3b8;
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .toggle-password:hover {
    background: #8b5cf6;
    border-color: #8b5cf6;
    color: white;
  }

  /* Checkbox */
  .bravo-checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: #94a3b8;
    font-size: 0.875rem;
  }

  .bravo-checkbox input {
    display: none;
  }

  .checkmark {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(139, 92, 246, 0.3);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }

  .bravo-checkbox input:checked + .checkmark {
    background: #8b5cf6;
    border-color: #8b5cf6;
  }

  .checkmark::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;
    color: white;
    font-size: 0.7rem;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .bravo-checkbox input:checked + .checkmark::after {
    opacity: 1;
  }

  /* Submit Button */
  .bravo-submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #8b5cf6, #ec4899);
    background-size: 200% 200%;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s ease;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    animation: gradientShift 3s ease infinite;
  }

  @keyframes gradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .bravo-submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 30px rgba(139, 92, 246, 0.5);
  }

  .bravo-submit-btn:active {
    transform: translateY(0);
  }

  .bravo-submit-btn.btn-success {
    background: linear-gradient(135deg, #22c55e, #10b981);
  }

  .bravo-submit-btn.btn-success:hover {
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.5);
  }

  .btn-spinner {
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255, 255, 255, 0.3);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    display: none;
  }

  .bravo-submit-btn.loading .btn-spinner {
    display: block;
  }

  .bravo-submit-btn.loading span {
    display: none;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }

  /* Password Strength */
  .password-strength-meter {
    margin-top: -8px;
    margin-bottom: 16px;
  }

  .strength-bar {
    height: 4px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;
  }

  .strength-fill {
    height: 100%;
    width: 0;
    border-radius: 2px;
    transition: all 0.4s ease;
  }

  .strength-text {
    color: #64748b;
    font-size: 0.75rem;
  }

  /* Footer */
  .bravo-auth-footer {
    color: #94a3b8;
    font-size: 0.9rem;
  }

  .bravo-auth-footer a {
    color: #8b5cf6;
    text-decoration: none;
    font-weight: 600;
    transition: all 0.3s ease;
  }

  .bravo-auth-footer a:hover {
    color: #ec4899;
    text-decoration: underline;
  }
</style>

<script>
  // Bravo Auth Modal JavaScript
  (function() {
    const loginTab = document.getElementById('bravoLoginTab');
    const signupTab = document.getElementById('bravoSignupTab');
    const loginForm = document.getElementById('bravoLoginForm');
    const signupForm = document.getElementById('bravoSignupForm');
    const loginFooter = document.querySelector('.login-footer');
    const signupFooter = document.querySelector('.signup-footer');

    function switchTab(tab) {
      if (tab === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        loginFooter.style.display = 'block';
        signupFooter.style.display = 'none';
      } else {
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
        loginForm.classList.remove('active');
        signupForm.classList.add('active');
        loginFooter.style.display = 'none';
        signupFooter.style.display = 'block';
      }
    }

    loginTab.addEventListener('click', () => switchTab('login'));
    signupTab.addEventListener('click', () => switchTab('signup'));

    document.querySelectorAll('.switch-tab').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab(link.dataset.target);
      });
    });

    // Password toggle
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      });
    });

    // Password strength meter
    const signupPassword = document.getElementById('signupPassword');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    if (signupPassword) {
      signupPassword.addEventListener('input', (e) => {
        const password = e.target.value;
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.length >= 12) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e'];
        const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
        
        strengthFill.style.width = `${(strength / 5) * 100}%`;
        strengthFill.style.backgroundColor = colors[strength - 1] || '#ef4444';
        strengthText.textContent = strength > 0 ? `Password strength: ${texts[strength - 1]}` : 'Enter a strong password';
        strengthText.style.color = colors[strength - 1] || '#64748b';
      });
    }
  })();
</script>
