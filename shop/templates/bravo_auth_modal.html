<!-- Auth Modal - Bravo Styled with Effects -->
<div class="modal fade" id="authModal" tabindex="-1" aria-labelledby="authModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-md modal-dialog-centered">
    <div class="modal-content bravo-auth-modal">
      <!-- Animated Background Effects -->
      <div class="modal-bg-animation">
        <div class="modal-mesh-gradient"></div>
        <div class="modal-orb modal-orb-1"></div>
        <div class="modal-orb modal-orb-2"></div>
        <div class="modal-particles" id="modalParticles"></div>
      </div>
      <div class="modal-header border-0 pb-0">
        <div class="bravo-auth-logo mx-auto">
          <i class="fas fa-shopping-bag"></i>
          <span>Shop<span class="gradient-text">Easy</span></span>
        </div>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <!-- Tabs -->
        <div class="bravo-tabs">
          <button class="bravo-tab active" data-tab="login" id="bravoLoginTab">Sign In</button>
          <button class="bravo-tab" data-tab="signup" id="bravoSignupTab">Create Account</button>
        </div>

        <!-- Login Form -->
        <div class="bravo-form active" id="bravoLoginForm">
          <form id="loginForm">
            <div class="bravo-input-group">
              <input type="text" class="bravo-input" name="username" placeholder="Username or Email" required>
              <i class="fas fa-user input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="password" class="bravo-input" name="password" placeholder="Password" required>
              <i class="fas fa-lock input-icon"></i>
              <button type="button" class="toggle-password" tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <label class="bravo-checkbox">
                <input type="checkbox" id="rememberMe">
                <span class="checkmark"></span>
                <span class="label-text">Remember me</span>
              </label>
            </div>
            <button type="submit" class="bravo-submit-btn">
              <span>Sign In</span>
              <div class="btn-spinner"></div>
            </button>
          </form>
        </div>

        <!-- Signup Form -->
        <div class="bravo-form" id="bravoSignupForm">
          <form id="signupForm">
            <div class="bravo-input-group">
              <input type="text" class="bravo-input" name="username" placeholder="Username" required minlength="3">
              <i class="fas fa-user input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="email" class="bravo-input" name="email" placeholder="Email Address" required>
              <i class="fas fa-envelope input-icon"></i>
            </div>
            <div class="bravo-input-group">
              <input type="password" class="bravo-input" name="password" id="signupPassword" placeholder="Password" required minlength="8">
              <i class="fas fa-lock input-icon"></i>
              <button type="button" class="toggle-password" tabindex="-1">
                <i class="fas fa-eye"></i>
              </button>
            </div>
            <div class="password-strength-meter mb-3">
              <div class="strength-bar">
                <div class="strength-fill" id="strengthFill"></div>
              </div>
              <small class="strength-text" id="strengthText">Enter a strong password</small>
            </div>
            <button type="submit" class="bravo-submit-btn btn-success">
              <span>Create Account</span>
              <div class="btn-spinner"></div>
            </button>
          </form>
        </div>

        <!-- Footer -->
        <div class="bravo-auth-footer text-center mt-3">
          <p class="login-footer">Don't have an account? <a href="#" class="switch-tab" data-target="signup">Sign up</a></p>
          <p class="signup-footer" style="display: none;">Already have an account? <a href="#" class="switch-tab" data-target="login">Sign in</a></p>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
  :root {
    /* Light Theme Matching Auth Page */
    --primary: #6366f1;
    --primary-light: #818cf8;
    --primary-dark: #4f46e5;
    --secondary: #ec4899;
    --accent: #06b6d4;
    --success: #22c55e;
    --warning: #f59e0b;
    --error: #ef4444;
    
    /* Light Background */
    --bg-primary: #f8fafc;
    --bg-secondary: #ffffff;
    --bg-card: rgba(255, 255, 255, 0.95);
    --bg-glass: rgba(255, 255, 255, 0.8);
    
    /* Text Colors */
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --text-muted: #94a3b8;
    
    /* Effects */
    --border: rgba(99, 102, 241, 0.2);
    --border-glow: rgba(99, 102, 241, 0.3);
    --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
    --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
    --glow-primary: 0 0 40px rgba(99, 102, 241, 0.15);
    --glow-secondary: 0 0 40px rgba(236, 72, 153, 0.15);
    
    /* Gradients */
    --gradient-mesh: linear-gradient(135deg, #6366f1 0%, #ec4899 50%, #06b6d4 100%);
    --gradient-card: linear-gradient(145deg, rgba(99, 102, 241, 0.08) 0%, rgba(6, 182, 212, 0.05) 100%);
  }

  /* Modal Background Animation */
  .modal-bg-animation {
    position: absolute;
    inset: 0;
    z-index: -1;
    overflow: hidden;
    border-radius: 24px;
  }

  .modal-mesh-gradient {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(at 40% 20%, rgba(99, 102, 241, 0.08) 0px, transparent 50%),
      radial-gradient(at 80% 0%, rgba(236, 72, 153, 0.06) 0px, transparent 50%),
      radial-gradient(at 0% 50%, rgba(6, 182, 212, 0.06) 0px, transparent 50%),
      radial-gradient(at 80% 50%, rgba(99, 102, 241, 0.05) 0px, transparent 50%),
      radial-gradient(at 0% 100%, rgba(236, 72, 153, 0.06) 0px, transparent 50%);
    animation: modalMeshMove 20s ease infinite;
  }

  @keyframes modalMeshMove {
    0%, 100% { 
      transform: translate(0, 0) scale(1); 
      filter: hue-rotate(0deg);
    }
    33% { 
      transform: translate(20px, -20px) scale(1.05); 
      filter: hue-rotate(20deg);
    }
    66% { 
      transform: translate(-15px, 15px) scale(0.95); 
      filter: hue-rotate(-15deg);
    }
  }

  /* Modal Floating Orbs */
  .modal-orb {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.3;
    animation: modalOrbFloat 12s ease-in-out infinite;
  }

  .modal-orb-1 {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, var(--primary), var(--secondary));
    top: -50px;
    left: -50px;
    animation-delay: 0s;
  }

  .modal-orb-2 {
    width: 150px;
    height: 150px;
    background: linear-gradient(135deg, var(--accent), var(--primary));
    bottom: -30px;
    right: -30px;
    animation-delay: -4s;
  }

  @keyframes modalOrbFloat {
    0%, 100% { transform: translate(0, 0) rotate(0deg); }
    25% { transform: translate(30px, -30px) rotate(90deg); }
    50% { transform: translate(0, 30px) rotate(180deg); }
    75% { transform: translate(-30px, -15px) rotate(270deg); }
  }

  /* Modal Particles */
  .modal-particles {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }

  .modal-particle {
    position: absolute;
    width: 3px;
    height: 3px;
    background: var(--primary-light);
    border-radius: 50%;
    opacity: 0.5;
    animation: modalParticleFloat 8s linear infinite;
  }

  @keyframes modalParticleFloat {
    0% { 
      transform: translateY(100%) translateX(0); 
      opacity: 0;
    }
    10% { opacity: 0.5; }
    90% { opacity: 0.5; }
    100% { 
      transform: translateY(-100%) translateX(50px); 
      opacity: 0;
    }
  }

  /* Bravo Auth Modal Styles */
  .bravo-auth-modal {
    background: var(--gradient-card);
    backdrop-filter: blur(20px) saturate(180%);
    border: 1px solid var(--border);
    border-radius: 24px;
    box-shadow: 
      var(--shadow-lg),
      var(--glow-primary),
      inset 0 1px 0 rgba(255, 255, 255, 0.1);
    overflow: hidden;
    position: relative;
  }

  .bravo-auth-modal::before {
    content: '';
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 2px;
    background: linear-gradient(90deg, 
      transparent, 
      var(--primary-light), 
      var(--secondary), 
      var(--accent), 
      transparent
    );
    animation: modalShimmer 3s ease infinite;
  }

  @keyframes modalShimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  .bravo-auth-modal::after {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.1),
      transparent
    );
    transition: left 0.7s ease;
  }

  .bravo-auth-modal:hover::after {
    left: 100%;
  }

  @keyframes gradientMove {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .bravo-auth-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 1.75rem;
    font-weight: 700;
    color: var(--text-primary);
    margin-left: auto;
    margin-right: auto;
    position: relative;
    z-index: 1;
  }

  .bravo-auth-logo i {
    font-size: 1.5rem;
    background: var(--gradient-mesh);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: modalLogoPulse 3s ease-in-out infinite;
  }

  @keyframes modalLogoPulse {
    0%, 100% { filter: brightness(1); }
    50% { filter: brightness(1.2); }
  }

  .gradient-text {
    background: var(--gradient-mesh);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  /* Tabs */
  .bravo-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    background: rgba(255, 255, 255, 0.8);
    padding: 6px;
    border-radius: 16px;
    border: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .bravo-tab {
    flex: 1;
    padding: 12px 20px;
    border: none;
    background: transparent;
    color: var(--text-secondary);
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .bravo-tab::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--gradient-mesh);
    opacity: 0;
    transition: opacity 0.4s ease;
    z-index: -1;
    border-radius: 12px;
  }

  .bravo-tab.active {
    color: white;
    box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
  }

  .bravo-tab.active::before {
    opacity: 1;
  }

  .bravo-tab:hover:not(.active) {
    color: var(--text-primary);
    background: rgba(99, 102, 241, 0.1);
  }

  /* Forms */
  .bravo-form {
    display: none;
    animation: fadeInUp 0.4s ease;
  }

  .bravo-form.active {
    display: block;
  }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Input Groups */
  .bravo-input-group {
    position: relative;
    margin-bottom: 16px;
    z-index: 1;
  }

  .bravo-input {
    width: 100%;
    padding: 14px 44px 14px 44px;
    background: rgba(255, 255, 255, 0.8);
    border: 2px solid var(--border);
    border-radius: 12px;
    color: var(--text-primary);
    font-size: 0.95rem;
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.06);
  }

  .bravo-input::placeholder {
    color: var(--text-muted);
  }

  .bravo-input:focus {
    outline: none;
    border-color: var(--primary-light);
    box-shadow: 
      0 0 0 3px rgba(99, 102, 241, 0.1),
      0 0 15px rgba(99, 102, 241, 0.15),
      inset 0 2px 4px rgba(0, 0, 0, 0.06);
    background: rgba(255, 255, 255, 0.95);
  }

  .bravo-input-group .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1rem;
    transition: all 0.3s ease;
  }

  .bravo-input:focus + .input-icon {
    color: var(--primary-light);
    transform: translateY(-50%) scale(1.1);
  }

  .toggle-password {
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(99, 102, 241, 0.1);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .toggle-password:hover {
    background: var(--primary);
    border-color: var(--primary);
    color: white;
    box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
  }

  /* Checkbox */
  .bravo-checkbox {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    color: var(--text-secondary);
    font-size: 0.875rem;
    z-index: 1;
  }

  .bravo-checkbox input {
    display: none;
  }

  .checkmark {
    width: 18px;
    height: 18px;

  .bravo-checkbox input:checked + .checkmark {

    border-color: var(--primary);
  }

  .checkmark::after {
    content: '\f00c';
    font-family: 'Font Awesome 6 Free';
    font-weight: 900;

  .bravo-checkbox input:checked + .checkmark::after {

  /* Submit Button */
  .bravo-submit-btn {
    width: 100%;
    padding: 16px;
    background: var(--gradient-mesh);
    background-size: 200% 200%;
    border: none;
    border-radius: 12px;
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;

    z-index: 1;
  }

  @keyframes modalGradientShift {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  .bravo-submit-btn::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(
      90deg,
      transparent,
      rgba(255, 255, 255, 0.3),
      transparent
    );
    transition: left 0.6s ease;

  .bravo-submit-btn:hover::before {
    left: 100%;
  }

  .bravo-submit-btn:hover {
    transform: translateY(-3px) scale(1.02);
    box-shadow: 
      0 10px 40px rgba(99, 102, 241, 0.5),
      0 0 60px rgba(236, 72, 153, 0.2);

  .bravo-submit-btn:active {

  .bravo-submit-btn.btn-success {
    background: linear-gradient(135deg, var(--success), #10b981);

  .bravo-submit-btn.btn-success:hover {

  .bravo-submit-btn.loading span {
    display: none;

  }

  /* Password Strength */
  .password-strength-meter {
    margin-top: -8px;
    margin-bottom: 16px;
    z-index: 1;
  }

  .strength-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-bottom: 4px;

  .strength-fill {
    height: 100%;
    width: 0;
    border-radius: 2px;

  .strength-text {
    color: var(--text-secondary);
    font-size: 0.75rem;

  .bravo-auth-footer {
    color: var(--text-secondary);
    font-size: 0.9rem;

    z-index: 1;
  }

  .bravo-auth-footer a {
    color: var(--primary);
    text-decoration: none;

    transition: all 0.3s ease;
  }

  .bravo-auth-footer a:hover {
    color: var(--secondary);
    text-decoration: underline;
  }
</style>

<script>
  // Bravo Auth Modal JavaScript with Effects
  (function() {
    const loginTab = document.getElementById('bravoLoginTab');
    const signupTab = document.getElementById('bravoSignupTab');
    const loginForm = document.getElementById('bravoLoginForm');
    const signupForm = document.getElementById('bravoSignupForm');
    const loginFooter = document.querySelector('.login-footer');
    const signupFooter = document.querySelector('.signup-footer');

    // Create modal particles
    function createModalParticles() {
      const particlesContainer = document.getElementById('modalParticles');
      if (!particlesContainer) return;
      
      // Clear existing particles
      particlesContainer.innerHTML = '';
      
      // Create 15 particles
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'modal-particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 8 + 's';
        particle.style.animationDuration = (8 + Math.random() * 4) + 's';
        particlesContainer.appendChild(particle);
      }
    }

    // Initialize particles when modal is shown
    const authModal = document.getElementById('authModal');
    if (authModal) {
      authModal.addEventListener('shown.bs.modal', function() {
        createModalParticles();
      });
    }

    function switchTab(tab) {
      if (tab === 'login') {
        loginTab.classList.add('active');
        signupTab.classList.remove('active');
        loginForm.classList.add('active');
        signupForm.classList.remove('active');
        loginFooter.style.display = 'block';
        signupFooter.style.display = 'none';
      } else {
        loginTab.classList.remove('active');
        signupTab.classList.add('active');
        loginForm.classList.remove('active');
        signupForm.classList.add('active');
        loginFooter.style.display = 'none';
        signupFooter.style.display = 'block';
      }
    }

    loginTab.addEventListener('click', () => switchTab('login'));
    signupTab.addEventListener('click', () => switchTab('signup'));

    document.querySelectorAll('.switch-tab').forEach(link => {
      link.addEventListener('click', (e) => {
        e.preventDefault();
        switchTab(link.dataset.target);
      });
    });

    // Password toggle
    document.querySelectorAll('.toggle-password').forEach(btn => {
      btn.addEventListener('click', () => {
        const input = btn.parentElement.querySelector('input');
        const icon = btn.querySelector('i');
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('fa-eye');
          icon.classList.add('fa-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('fa-eye-slash');
          icon.classList.add('fa-eye');
        }
      });
    });

    // Password strength meter
    const signupPassword = document.getElementById('signupPassword');
    const strengthFill = document.getElementById('strengthFill');
    const strengthText = document.getElementById('strengthText');

    if (signupPassword) {
      signupPassword.addEventListener('input', (e) => {
        const password = e.target.value;
        let strength = 0;
        
        if (password.length >= 8) strength++;
        if (password.length >= 12) strength++;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
        if (/\d/.test(password)) strength++;
        if (/[^a-zA-Z0-9]/.test(password)) strength++;

        const colors = ['#ef4444', '#f97316', '#f59e0b', '#84cc16', '#22c55e'];
        const texts = ['Very Weak', 'Weak', 'Fair', 'Good', 'Strong'];
        
        strengthFill.style.width = `${(strength / 5) * 100}%`;
        strengthFill.style.backgroundColor = colors[strength - 1] || '#ef4444';
        strengthText.textContent = strength > 0 ? `Password strength: ${texts[strength - 1]}` : 'Enter a strong password';
        strengthText.style.color = colors[strength - 1] || '#64748b';
      });
    }
  })();
</script>
